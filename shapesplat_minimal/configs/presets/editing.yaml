name: editing
description: "Run object-level editing demo on the example dataset."
default_out: outputs/experiments/editing
steps:
  - name: create_example_dataset
    enabled: true
    command: [python, scripts/create_example_dataset.py, --out, examples/example_dataset, --num-images, "4", --size, "128"]
  - name: run_edit_demo
    enabled: true
    command:
      - python
      - scripts/run_edit_demo.py
      - --config
      - configs/editing.yaml
      - --input
      - examples/example_dataset/images/example_000.png
      - --mask
      - examples/example_dataset/masks/example_000.npy
      - --out
      - "{out}"
      - --object-id
      - "0"
      - --no-run-metadata
  - name: generate_report
    enabled: true
    command: [python, scripts/generate_report.py, --root, "{out}", --out, "{out}/report", --title, "ShapeSplat++ Editing Report", --no-run-metadata]

