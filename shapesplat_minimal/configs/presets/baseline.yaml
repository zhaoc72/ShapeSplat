name: baseline
description: "Export baseline inputs and run dummy baselines on the example dataset."
default_out: outputs/experiments/baseline
steps:
  - name: create_example_dataset
    enabled: true
    command: [python, scripts/create_example_dataset.py, --out, examples/example_dataset, --num-images, "4", --size, "128"]
  - name: run_baseline_dataset
    enabled: true
    command: [python, scripts/run_baseline_dataset.py, --config, configs/baseline_protocol.yaml, --manifest, examples/example_dataset/manifest.csv, --out, "{out}", --max-images, "3", --run-dummy]

