name: external_baseline
description: "Run the dummy external baseline adapter on the example dataset."
default_out: outputs/experiments/external_baseline
steps:
  - name: create_example_dataset
    enabled: true
    command: [python, scripts/create_example_dataset.py, --out, examples/example_dataset, --num-images, "4", --size, "128"]
  - name: run_external_baseline_dataset
    enabled: true
    command: [python, scripts/run_external_baseline_dataset.py, --config, configs/same_mask.yaml, --external-config, configs/external_baselines.yaml, --manifest, examples/example_dataset/manifest.csv, --adapter, dummy_external, --out, "{out}", --max-images, "3", --no-run-metadata]

