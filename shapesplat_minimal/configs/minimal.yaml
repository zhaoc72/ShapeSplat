seed: 7
device: auto

image:
  size: 64
  input_path: null

frontend:
  # SAM backend: stub / real / auto. 默认 stub 不需要真实 SAM3 依赖。
  sam_backend: stub
  sam3_checkpoint: null
  sam3_model_type: null
  sam3_device: auto
  sam3_prompt_mode: automatic
  sam3_text_prompts:
    - object
  sam3_score_threshold: 0.5
  sam3_max_masks: 8

  # DINO backend: stub / real / auto. dino_backend 只控制 descriptor extractor。
  dino_backend: stub
  dino_model_name: null
  dino_checkpoint: null
  dino_device: auto
  dino_feature_layer: last
  dino_feature_dim: null
  dino_input_size: null
  dino_l2_normalize: true
  dino_pooling:
    use_eroded_mask: true
    erosion_kernel: 5
    use_distance_weight: true
    fallback_to_bbox_crop_for_small_masks: true
    small_mask_area_ratio: 0.005

  # Depth backend: stub / real / auto. depth 只是 weak initialization/layout cue。
  depth_backend: stub
  depth_model_name: null
  depth_checkpoint: null
  depth_device: auto
  depth_input_size: null
  depth_inverse: false
  depth_normalize: true
  depth_normalize_on_foreground: true
  depth_percentile_low: 2.0
  depth_percentile_high: 98.0
  depth_min_valid: 1.0e-6

  max_num_objects: 4
  min_area_ratio: 0.002
  mask_conf_threshold: 0.2

camera:
  focal_scale: 1.2
  z_near: 1.0
  z_far: 3.2

gaussians:
  visible_min: 32
  visible_max: 64
  visible_density: 0.01
  hidden_base: 16
  init_log_scale: -3.5
  init_opacity: 0.25
  hidden_opacity: 0.08
  use_hidden: true
  use_densification: false

retrieval:
  top_k: 3
  confidence_low: 0.15
  confidence_high: 0.80
  support_sigma: 0.18
  # 如果 shape asset 有 descriptors [V,D]，检索时使用 max-over-views similarity。
  use_multi_view_descriptors: true
  temperature: 0.07

shape_bank:
  # toy / file / auto。默认 toy 使用 sphere/box/cylinder smoke-test bank。
  backend: toy
  # file backend 的本地点云目录；null 时 file 报错，auto fallback toy。
  root: null
  # 缺少 shape descriptor 时 fallback descriptor 的维度；null 表示使用 DINO descriptor dim。
  descriptor_dim: null
  # 每个 shape 下采样/补采样后的点数。
  num_points: 512
  # 是否将点云中心化并缩放到 canonical unit bbox。
  normalize_points: true
  center_points: true
  scale_to_unit: true
  file_extensions:
    - .npz
    - .npy
  max_shapes: null
  fallback_to_toy: true
  # 如果 shape 文件没有 descriptor，生成 deterministic random descriptor 以保持最小版可运行。
  random_descriptor_if_missing: true
  descriptor_seed: 123

renderer:
  # soft / real / auto。默认 soft 使用最小 PyTorch renderer。
  backend: soft
  # 真实 CUDA renderer 的 module/class 动态导入路径；minimal 版本默认不填写。
  real_renderer_module: null
  real_renderer_class: null
  # auto 模式下真实 renderer 不可用时 fallback 到 soft renderer。
  fallback_to_soft: true
  beta_depth: 1.5
  min_sigma_px: 1.0
  max_sigma_px: 4.0
  # 当前 minimal 使用 visibility_weighted contribution；真实 renderer 应输出 transmittance-weighted maps。
  contribution_mode: visibility_weighted
  ownership_eps: 1.0e-6
  # per-object contribution maps 是本方法核心，真实 renderer 不能省略。
  render_object_contributions: true
  render_depth: true

training:
  lr: 0.025
  visible_warmup_iters: 5
  hidden_prior_iters: 5
  joint_ownership_iters: 5
  edit_finetune_iters: 3
  log_every: 1

loss_weights:
  visible_rgb: 1.0
  visible_alpha: 0.5
  visible_depth: 0.02
  hidden_prior: 0.10
  bridge: 0.02
  scene: 1.0
  identity: 0.50
  layout: 0.0
  bg: 0.05
  reg: 0.001
  edit: 0.20
  edit_alpha: 0.05

edit:
  dilate_radius: 3

ablation:
  # visible-hidden factorized Gaussian representation。
  use_visible_hidden_split: true
  # 是否初始化 hidden Gaussian branch。
  use_hidden_branch: true
  # confidence-weighted hidden support prior loss。
  use_hidden_prior: true
  # 是否用 retrieval confidence 控制 hidden budget / prior strength。
  use_confidence_weighting: true
  # 是否使用 DINO descriptor 做 shape retrieval；与 dino_backend 不同。
  use_dino_retrieval: true
  # scene-level compositional RGB loss。
  use_scene_loss: true
  # identity / ownership loss，防止 object 合并或 same-category swap。
  use_ownership_loss: true
  # weak depth consistency loss。
  use_depth_loss: true
  # background leakage loss。
  use_bg_loss: true
  # visible-hidden continuity bridge loss。
  use_bridge_loss: true
  # differentiable edit-consistency loss。
  use_edit_consistency: true
  # 预留 layout loss 开关，minimal 版本默认权重为 0。
  use_layout_loss: true
