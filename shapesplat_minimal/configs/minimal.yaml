seed: 7
device: auto
image:
  size: 64
  input_path: null

frontend:
  # SAM backend: stub / real / auto。默认 stub，不要求真实 SAM3 依赖。
  sam_backend: stub
  sam3_checkpoint: null
  sam3_model_type: null
  sam3_device: auto
  sam3_prompt_mode: automatic
  sam3_text_prompts:
    - object
  sam3_score_threshold: 0.5
  sam3_max_masks: 8

  # DINO backend: stub / real / auto。默认 stub，不要求真实 DINOv3 依赖。
  dino_backend: stub
  # 真实 DINOv3 模型名称，可对应官方 repo / torch hub / transformers wrapper。
  dino_model_name: null
  # 可选本地 checkpoint；real 模式中如果路径不存在会报错，auto 模式 fallback。
  dino_checkpoint: null
  dino_device: auto
  dino_feature_layer: last
  dino_feature_dim: null
  # 真实 DINOv3 前向时可选 resize size；null 表示使用当前 image size。
  dino_input_size: null
  # 是否对 dense features 和 pooled descriptors 做 L2 normalize。
  dino_l2_normalize: true
  # mask-guided descriptor pooling：腐蚀/内部权重减少边界污染，小 mask 使用 bbox fallback。
  dino_pooling:
    use_eroded_mask: true
    erosion_kernel: 5
    use_distance_weight: true
    fallback_to_bbox_crop_for_small_masks: true
    small_mask_area_ratio: 0.005

  # Depth backend: stub / real / auto。默认 stub，不要求真实 depth model。
  depth_backend: stub
  # 真实 depth 模型名称，可对应本地 wrapper / torch hub / transformers 模型名。
  depth_model_name: null
  # 可选本地 checkpoint；real 模式中如果路径不存在会报错，auto 模式 fallback。
  depth_checkpoint: null
  depth_device: auto
  # 真实 depth 模型前向时可选 resize size；null 表示使用当前 image size。
  depth_input_size: null
  # 某些模型输出 inverse depth/disparity；true 时会先转成 depth-like map。
  depth_inverse: false
  # 单目深度只有相对尺度，进入 Gaussian 前默认归一化到 canonical z range。
  depth_normalize: true
  depth_normalize_on_foreground: true
  depth_percentile_low: 2.0
  depth_percentile_high: 98.0
  depth_min_valid: 1.0e-6

  max_num_objects: 4
  min_area_ratio: 0.002
  mask_conf_threshold: 0.2

camera:
  focal_scale: 1.2
  z_near: 1.0
  z_far: 3.2

gaussians:
  visible_min: 32
  visible_max: 64
  visible_density: 0.01
  hidden_base: 16
  init_log_scale: -3.5
  init_opacity: 0.25
  hidden_opacity: 0.08
  use_hidden: true
  use_densification: false

retrieval:
  top_k: 3
  confidence_low: 0.15
  confidence_high: 0.80
  support_sigma: 0.18

renderer:
  beta_depth: 1.5
  min_sigma_px: 1.0
  max_sigma_px: 4.0

training:
  lr: 0.025
  visible_warmup_iters: 5
  hidden_prior_iters: 5
  joint_ownership_iters: 5
  edit_finetune_iters: 3
  log_every: 1

loss_weights:
  visible_rgb: 1.0
  visible_alpha: 0.5
  visible_depth: 0.02
  hidden_prior: 0.10
  bridge: 0.02
  scene: 1.0
  identity: 0.50
  layout: 0.0
  bg: 0.05
  reg: 0.001
  edit: 0.20
  edit_alpha: 0.05

edit:
  dilate_radius: 3

# 消融开关默认保持主方法开启。
ablation:
  # DINO backend 控制 descriptor extractor 是 stub 还是真实 DINOv3；
  # use_dino_retrieval 只控制 shape retrieval 是否使用 descriptor。
  use_visible_hidden_split: true
  use_hidden_branch: true
  use_hidden_prior: true
  use_confidence_weighting: true
  use_dino_retrieval: true
  use_scene_loss: true
  use_ownership_loss: true
  use_depth_loss: true
  use_bg_loss: true
  use_bridge_loss: true
  use_edit_consistency: true
  use_layout_loss: true
