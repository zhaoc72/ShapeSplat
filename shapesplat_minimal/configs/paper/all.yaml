# paper all profile：串行运行当前所有轻量论文实验模块。
profile: all
description: "Run main comparison, ablation, stress, editing, baselines, and reporting."
output_subdir: paper_all
max_images: 3
benchmark_schema: v2
benchmark_manifest: null
use_frontend_cache: false
frontend_cache_manifest: null
create_example_dataset: true
create_stress_dataset: true
run_main_comparison: true
run_ablation: true
run_stress: true
run_editing: true
run_baselines: true
generate_report: true
configs:
  comparison: configs/benchmark_baseline.yaml
  ablation: configs/minimal.yaml
  stress: configs/stress_benchmark.yaml
  editing: configs/editing.yaml
  baseline: configs/baseline_protocol.yaml
ablations: configs/ablations.yaml
frontend_cache:
  use_cache: false
  cache_manifest: null
  cache_root: null
