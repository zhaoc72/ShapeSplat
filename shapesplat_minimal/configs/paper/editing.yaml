# editing profile：批量运行 object-level editing suite。
profile: editing
description: "Paper editing evaluation profile."
config: configs/editing.yaml
manifest: examples/example_dataset/manifest.csv
benchmark_schema: v2
benchmark_manifest: null
use_frontend_cache: false
