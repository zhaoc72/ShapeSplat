# Batch smoke test 配置：继承 DEFAULT_CONFIG，只缩短训练迭代，方便多图快速跑通。
seed: 7
device: auto

image:
  size: 64
  input_path: null

renderer:
  backend: soft
  real_renderer_module: null
  real_renderer_class: null
  fallback_to_soft: true
  beta_depth: 1.5
  min_sigma_px: 1.0
  max_sigma_px: 4.0
  contribution_mode: visibility_weighted
  ownership_eps: 1.0e-6
  render_object_contributions: true
  render_depth: true

training:
  visible_warmup_iters: 3
  hidden_prior_iters: 3
  joint_ownership_iters: 3
  edit_finetune_iters: 2
