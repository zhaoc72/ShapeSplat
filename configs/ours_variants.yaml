# Ours 内部方法变体，用于论文消融；这些不是外部 baseline。
variants:
  - name: full
    overrides:
      ours.variant: full
      ablation.use_visible_hidden_split: true
      ablation.use_hidden_branch: true
      ablation.use_hidden_prior: true
      ablation.use_confidence_weighting: true
      ablation.use_ownership_loss: true
      ablation.use_edit_consistency: true

  - name: visible_only
    overrides:
      ours.variant: visible_only
      ablation.use_hidden_branch: false
      ablation.use_hidden_prior: false

  - name: no_hidden_prior
    overrides:
      ours.variant: no_hidden_prior
      ablation.use_hidden_prior: false

  - name: no_confidence_weighting
    overrides:
      ours.variant: no_confidence_weighting
      ablation.use_confidence_weighting: false

  - name: no_visible_hidden_split
    overrides:
      ours.variant: no_visible_hidden_split
      ablation.use_visible_hidden_split: false

  - name: no_ownership_loss
    overrides:
      ours.variant: no_ownership_loss
      ablation.use_ownership_loss: false

  - name: no_edit_consistency
    overrides:
      ours.variant: no_edit_consistency
      ablation.use_edit_consistency: false

  - name: ours_independent
    overrides:
      ours.variant: ours_independent
      ablation.use_scene_loss: false
      ablation.use_ownership_loss: false

  - name: holistic_union_mask
    overrides:
      ours.variant: holistic_union_mask
      ablation.use_visible_hidden_split: false
      ablation.use_hidden_branch: false
