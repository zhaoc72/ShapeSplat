# CO3Dv2 single subset 本地转换配置。
# 中文注释：CO3Dv2 single 默认作为 real-image diagnostic；mask 是 visible foreground mask。
dataset:
  name: co3dv2_single
  root: D:\projects\datasets\co3dv2_single
  out: data/co3dv2_single_benchmark
  source_dataset: co3dv2_single
  split: test
  frame_stride: 10
  max_categories: null
  max_sequences: null
  max_frames_per_sequence: null
  copy_files: true
  overwrite: false
  prefer_set_list: null

benchmark:
  schema_version: v2
  use_visible_masks: true
  expected_num_objects: 1
  real_image_diagnostic: true
  geometry_optional: true
