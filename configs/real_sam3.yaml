# 可选真实 SAM3 配置示例。
# 用户需要把 sam3_checkpoint 改成自己的真实 checkpoint 路径；
# 默认 null 时，sam_backend=auto 会自动 fallback 到 Sam3Stub。
seed: 7
device: auto
image:
  size: 64
  input_path: null

frontend:
  sam_backend: auto
  sam3_checkpoint: null
  sam3_model_type: null
  sam3_device: auto
  sam3_prompt_mode: automatic
  sam3_text_prompts:
    - object
  sam3_score_threshold: 0.5
  sam3_max_masks: 8
  max_num_objects: 6
  min_area_ratio: 0.002
  mask_conf_threshold: 0.5

camera:
  focal_scale: 1.2
  z_near: 1.0
  z_far: 3.2

gaussians:
  visible_min: 32
  visible_max: 64
  visible_density: 0.01
  hidden_base: 16
  init_log_scale: -3.5
  init_opacity: 0.25
  hidden_opacity: 0.08
  use_hidden: true
  use_densification: false

retrieval:
  top_k: 3
  confidence_low: 0.15
  confidence_high: 0.80
  support_sigma: 0.18

renderer:
  beta_depth: 1.5
  min_sigma_px: 1.0
  max_sigma_px: 4.0

training:
  lr: 0.025
  visible_warmup_iters: 5
  hidden_prior_iters: 5
  joint_ownership_iters: 5
  edit_finetune_iters: 3
  log_every: 1

loss_weights:
  visible_rgb: 1.0
  visible_alpha: 0.5
  visible_depth: 0.02
  hidden_prior: 0.10
  bridge: 0.02
  scene: 1.0
  identity: 0.50
  layout: 0.0
  bg: 0.05
  reg: 0.001
  edit: 0.20
  edit_alpha: 0.05

edit:
  dilate_radius: 3

ablation:
  use_visible_hidden_split: true
  use_hidden_branch: true
  use_hidden_prior: true
  use_confidence_weighting: true
  use_dino_retrieval: true
  use_scene_loss: true
  use_ownership_loss: true
  use_depth_loss: true
  use_bg_loss: true
  use_bridge_loss: true
  use_edit_consistency: true
  use_layout_loss: true
