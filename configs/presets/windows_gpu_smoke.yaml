name: windows_gpu_smoke
description: "Run GPU runtime and tiny ShapeSplat++ smoke test on Windows."
default_out: outputs/experiments/windows_gpu_smoke
steps:
  - name: print_gpu_info
    enabled: true
    command:
      - python
      - scripts/print_gpu_info.py

  - name: check_gpu_runtime
    enabled: true
    command:
      - python
      - scripts/check_gpu_runtime.py
      - --config
      - configs/local_windows_rtx5090.yaml
      - --device
      - cuda
      - --require-cuda
      - --out
      - "{out}/check_gpu_runtime"

  - name: gpu_smoke_experiment
    enabled: true
    command:
      - python
      - scripts/run_gpu_smoke_experiment.py
      - --config
      - configs/local_windows_rtx5090.yaml
      - --out
      - "{out}/gpu_smoke"
      - --require-cuda
      - --iters
      - "2"
