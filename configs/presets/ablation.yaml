name: ablation
description: "Run a small ablation suite for smoke testing."
default_out: outputs/experiments/ablation
steps:
  - name: create_example_dataset
    enabled: true
    command: [python, scripts/create_example_dataset.py, --out, examples/example_dataset, --num-images, "4", --size, "128"]
  - name: run_ablation
    enabled: true
    command: [python, scripts/run_ablation.py, --config, configs/minimal.yaml, --ablations, configs/ablations.yaml, --input, examples/example_dataset/images/example_000.png, --out, "{out}", --max-experiments, "3", --no-run-metadata]

