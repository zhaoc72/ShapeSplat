name: shape_prior_check
description: "Prepare a toy file shape bank, precompute descriptors, and verify retrieval."
default_out: outputs/experiments/shape_prior_check
steps:
  - name: prepare_shape_bank
    enabled: true
    command:
      - python
      - scripts/prepare_shape_bank.py
      - --source
      - toy
      - --out
      - "{out}/shape_bank_prepared"
      - --num-points
      - "512"
      - --descriptor-dim
      - "16"
      - --descriptor-mode
      - point_stats
  - name: check_shape_retrieval
    enabled: true
    command:
      - python
      - scripts/check_shape_retrieval.py
      - --config
      - configs/real_shape_bank.yaml
      - --input
      - examples/test_image.png
      - --shape-root
      - "{out}/shape_bank_prepared"
      - --out
      - "{out}/retrieval"
      - --top-k
      - "3"
