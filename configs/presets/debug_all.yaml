name: debug_all
description: "Run a compact end-to-end debug pack across core experiment modes."
default_out: outputs/experiments/debug_all
steps:
  - name: create_example_dataset
    enabled: true
    command: [python, scripts/create_example_dataset.py, --out, examples/example_dataset, --num-images, "4", --size, "128"]
  - name: run_minimal
    enabled: true
    command: [python, scripts/run_minimal.py, --config, configs/minimal.yaml, --input, examples/example_dataset/images/example_000.png, --out, "{out}/minimal", --eval, --no-run-metadata]
  - name: run_comparison
    enabled: true
    command: [python, scripts/run_comparison.py, --config, configs/comparison_minimal.yaml, --manifest, examples/example_dataset/manifest.csv, --out, "{out}/comparison", --max-images, "2", --no-run-metadata]
  - name: create_stress_dataset
    enabled: true
    command: [python, scripts/create_stress_dataset.py, --out, examples/stress_dataset, --num-per-subset, "1", --size, "128"]
  - name: run_stress_benchmark
    enabled: true
    command: [python, scripts/run_stress_benchmark.py, --config, configs/stress_benchmark.yaml, --manifest, examples/stress_dataset/manifest.csv, --out, "{out}/stress", --max-images, "4", --no-run-metadata]
  - name: run_edit_demo
    enabled: true
    command: [python, scripts/run_edit_demo.py, --config, configs/editing.yaml, --input, examples/example_dataset/images/example_000.png, --mask, examples/example_dataset/masks/example_000.npy, --out, "{out}/editing", --object-id, "0", --no-run-metadata]
  - name: generate_report
    enabled: true
    command: [python, scripts/generate_report.py, --root, "{out}/comparison", --out, "{out}/report", --title, "ShapeSplat++ Debug Report", --no-run-metadata]

