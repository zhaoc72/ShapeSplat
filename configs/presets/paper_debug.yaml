# run_experiment 入口的 paper debug preset，只调用 paper runner，不改算法。
name: paper_debug
description: "Run paper debug profile."
default_out: outputs/experiments/paper_debug
steps:
  - name: run_paper_debug
    enabled: true
    command:
      - python
      - scripts/run_paper_experiments.py
      - --profile
      - debug
      - --out
      - "{out}"
      - --generate-tables
      - --generate-report
