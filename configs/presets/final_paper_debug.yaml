name: final_paper_debug
description: "Run final paper debug experiment."
default_out: outputs/experiments/final_paper_debug
steps:
  - name: check_final_ready
    enabled: true
    command:
      - python
      - scripts/check_final_paper_ready.py
      - --profile
      - configs/paper/final_debug.yaml
      - --out
      - "{out}/readiness"

  - name: run_final_paper
    enabled: true
    command:
      - python
      - scripts/run_final_paper.py
      - --profile
      - configs/paper/final_debug.yaml
      - --out
      - "{out}/run"
      - --generate-tables
      - --generate-report
