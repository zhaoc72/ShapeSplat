# 正式实验 method catalog。enabled=false 的真实方法只是登记模板，不会默认运行。
methods:
  - name: ours_full
    family: ours
    output_type: gaussian_objects
    native_object_buffers: true
    editable: true
    source: ours_runner
    enabled: true

  - name: independent_gaussian
    family: internal_baseline
    output_type: gaussian_objects
    native_object_buffers: true
    editable: approximate
    source: internal
    enabled: true

  - name: identity_mask
    family: dummy
    output_type: alpha_render
    native_object_buffers: false
    editable: false
    source: dummy
    enabled: true

  - name: scene_union
    family: dummy
    output_type: alpha_render
    native_object_buffers: false
    editable: false
    source: dummy
    enabled: true

  - name: spar3d
    family: object_centric_external
    output_type: mesh_or_render
    native_object_buffers: approximate
    editable: approximate
    source: external
    enabled: false
    adapter: command_template

  - name: trellis
    family: object_centric_external
    output_type: 3d_asset
    native_object_buffers: approximate
    editable: approximate
    source: external
    enabled: false
    adapter: command_template

  - name: vggt
    family: scene_level_external
    output_type: scene_depth_points
    native_object_buffers: false
    editable: false
    source: external
    enabled: false
    adapter: command_template

  - name: dust3r
    family: scene_level_external
    output_type: scene_points
    native_object_buffers: false
    editable: false
    source: external
    enabled: false
    adapter: command_template
