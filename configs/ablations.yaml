# ShapeSplat++ minimal 默认消融列表。
# 这些实验用于验证工程路径和指标，不代表正式论文 benchmark。
experiments:
  # Full method：所有 minimal 模块开启。
  - name: full
    overrides:
      ablation.use_visible_hidden_split: true
      ablation.use_hidden_branch: true
      ablation.use_hidden_prior: true
      ablation.use_confidence_weighting: true
      ablation.use_dino_retrieval: true
      ablation.use_scene_loss: true
      ablation.use_ownership_loss: true
      ablation.use_depth_loss: true
      ablation.use_bg_loss: true
      ablation.use_bridge_loss: true
      ablation.use_edit_consistency: true

  # 去掉 hidden Gaussian branch。
  - name: no_hidden_branch
    overrides:
      ablation.use_hidden_branch: false

  # 去掉 visible-hidden factorization，所有 Gaussian 视为同一 visible branch。
  - name: no_visible_hidden_split
    overrides:
      ablation.use_visible_hidden_split: false

  # 去掉 confidence-weighted hidden support prior。
  - name: no_hidden_prior
    overrides:
      ablation.use_hidden_prior: false

  # hidden budget / prior strength 不再由 retrieval confidence 控制。
  - name: no_confidence_weighting
    overrides:
      ablation.use_confidence_weighting: false

  # 不使用 DINO descriptor retrieval，固定选择第一个 toy shape。
  - name: no_dino_retrieval
    overrides:
      ablation.use_dino_retrieval: false

  # 关闭 scene-level compositional RGB loss。
  - name: no_scene_loss
    overrides:
      ablation.use_scene_loss: false

  # 关闭 identity ownership loss。
  - name: no_ownership_loss
    overrides:
      ablation.use_ownership_loss: false

  # 关闭 weak depth consistency loss。
  - name: no_depth_loss
    overrides:
      ablation.use_depth_loss: false

  # 关闭 background leakage loss。
  - name: no_bg_loss
    overrides:
      ablation.use_bg_loss: false

  # 关闭 visible-hidden bridge loss。
  - name: no_bridge_loss
    overrides:
      ablation.use_bridge_loss: false

  # 关闭 edit consistency loss。
  - name: no_edit_consistency
    overrides:
      ablation.use_edit_consistency: false
