# Generated artifact cleanup rules.
# 中文注释：该配置只用于清理测试/调试生成文件，不用于删除源码、配置、测试、文档或正式实验数据。

protected_paths:
  - src
  - scripts
  - configs
  - tests
  - docs
  - README.md
  - requirements.txt
  - pyproject.toml
  - agents.md
  - .git
  - data/co3dv2_single_benchmark
  - outputs/cache_co3dv2_real_frontend_vits16
  - outputs/cache_co3dv2_real_frontend_vits16_highres
  - outputs/check_dinov3_vits16
  - outputs/check_dinov3_vitl16
  - outputs/ours_co3dv2_vits16_debug
  - outputs/ours_co3dv2_vits16_highres
  - outputs/co3dv2_diagnostics_vits16
  - outputs/check_gpu_runtime_cuda
  - outputs/gpu_smoke_cuda

default_candidate_patterns:
  dir_names:
    - __pycache__
    - .pytest_cache
    - .pytest_tmp
    - .pytest_basetemp
    - build
    - .mypy_cache
    - .ruff_cache
    - htmlcov
  dir_suffixes:
    - .egg-info
  file_suffixes:
    - .pyc
  file_names:
    - .coverage
  paths:
    - outputs/minimal
    - outputs/real_input
    - outputs/eval_real_input
    - outputs/check_sam_stub
    - outputs/check_dino_stub
    - outputs/check_depth_stub
    - outputs/check_shape_toy
    - outputs/check_shape_file
    - outputs/check_renderer_soft
    - outputs/artifact_validation_dry
    - outputs/run_compare_self
    - outputs/exp_minimal
    - outputs/exp_stress
    - outputs/exp_editing
    - outputs/exp_comparison
  globs:
    - outputs/debug*
    - outputs/*_debug_old
    - dist/*.zip

optional_experiment_output_patterns:
  globs:
    - outputs/cache*
    - outputs/ours*
    - outputs/co3dv2*
    - outputs/final*
    - outputs/paper*
    - outputs/report*
    - runs

default_keep_globs:
  - data
  - data/**
  - examples
  - examples/**
  - outputs/cache*
  - outputs/cache*/**
  - outputs/ours*
  - outputs/ours*/**
  - outputs/co3dv2*
  - outputs/co3dv2*/**
  - outputs/final*
  - outputs/final*/**
  - outputs/paper*
  - outputs/paper*/**
  - outputs/report*
  - outputs/report*/**
  - runs
  - runs/**

trash_root: .trash/generated_artifacts
max_depth: 12
notes: "Default cleanup is dry-run and conservative; use --execute to move candidates to trash."
