profile: co3dv2_diagnostics
description: "Run ShapeSplat++ real-image diagnostics on CO3Dv2 single subset."
benchmark_manifest: data/co3dv2_single_benchmark/manifest.csv
config: configs/final_ours.yaml
out_name: co3dv2_diagnostics
max_images: 20
use_frontend_cache: false
frontend_cache_manifest: null
run_ours_benchmark: true
run_editing: true
generate_report: true
real_image_diagnostics: true
report_geometry: false

# 中文注释：CO3Dv2 single 默认不报告 Chamfer/F-score，除非用户明确提供 pointcloud alignment 协议。
