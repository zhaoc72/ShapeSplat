# 论文指标协议：optional_geometry 只有点云预测和 GT 都存在时才启用。
metric_groups:
  object_consistency:
    - InstIoU_mean
    - AttrAcc
    - AttrPurity_mean
    - Leakage
  editing:
    - CollateralL1
    - EditLocality
    - DeletionResidual
    - ObjectSupportIoU
  stress:
    - SwapRateProxy
    - OrderAccProxy
    - OcclusionRecallProxy
    - TruncationStabilityProxy
  rendering:
    - ForegroundRGBL1
    - ForegroundAlphaError
  # optional_geometry 只有预测点云和 GT 点云存在时才计算；默认 minimal pipeline 不要求。
  optional_geometry:
    - ChamferL2
    - FScore
    - VisibleCD
    - HiddenCD
