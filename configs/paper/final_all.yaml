# Final paper-style profile. 当前 example 路径用于链路验证；投稿实验请替换为真实 benchmark/cache/baseline 输出。
profile: final_all
description: "Run final paper-style experiments."
final_paper: true

runtime:
  device: auto
  cuda_device: 0
  prefer_gpu: true
  allow_cpu_fallback: false
  require_cuda_for_experiments: false
  mixed_precision: false

benchmark:
  manifest: data/example_benchmark_v2/manifest.csv
  config: configs/final_benchmark.yaml
  require_valid: true
  create_if_missing: true
  max_images: 3

frontend_cache:
  use_cache: false
  cache_manifest: null
  cache_root: null
  validate_cache: false

ours:
  config: configs/final_ours.yaml
  output_dir: ours
  run_full: true
  save_checkpoint: false
  strict_ready: false

variants:
  enabled: true
  config: configs/final_ours.yaml
  variants: configs/ours_variants.yaml
  output_dir: variants
  variant_names: [full, visible_only, no_hidden_prior, no_confidence_weighting, no_ownership_loss, no_edit_consistency]
  max_images: 3

baselines:
  enabled: true
  run_independent_gaussian: true
  run_dummy_baselines: true
  external_method_outputs: configs/final_method_outputs.yaml
  method_catalog: configs/method_catalog.yaml
  output_dir: baselines

comparison:
  enabled: true
  config: configs/final_ours.yaml
  method_catalog: configs/method_catalog.yaml
  method_outputs: configs/final_method_outputs.yaml
  output_dir: comparison

stress:
  enabled: true
  config: configs/stress_benchmark.yaml
  manifest: examples/stress_dataset/manifest.csv
  create_if_missing: true
  num_per_subset: 2
  max_images: 12
  output_dir: stress

editing:
  enabled: true
  config: configs/editing.yaml
  manifest: examples/example_dataset/manifest.csv
  create_if_missing: true
  max_images: 3
  max_objects: 2
  output_dir: editing

tables:
  enabled: true
  output_dir: tables
  columns: configs/paper/table_columns.yaml

report:
  enabled: true
  output_dir: report
  title: "ShapeSplat++ Final Paper Report"

readiness:
  strict: false
  warn_if_stub_backend: true
  warn_if_toy_shape_bank: true
  warn_if_soft_renderer: true
  warn_if_missing_external_baselines: true
  warn_if_missing_geometry_gt: true
