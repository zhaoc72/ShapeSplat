# 使用 cached frontend outputs 的实验配置。
# cache 只保存 SAM/DINO/Depth 前端输出；后续 Gaussian optimization 仍会正常重新运行。
seed: 123

image:
  size: 64

frontend_cache:
  use_cache: true
  save_cache: false
  cache_root: outputs/frontend_cache
  cache_manifest: outputs/frontend_cache/cache_manifest.csv
  fallback_to_compute: true
  save_dino_features: false
  validate_on_load: true

frontend:
  mask_source: sam
  sam_backend: auto
  dino_backend: auto
  depth_backend: auto

renderer:
  backend: soft

training:
  visible_warmup_iters: 3
  hidden_prior_iters: 3
  joint_ownership_iters: 3
  edit_finetune_iters: 2

baseline:
  independent_gaussian:
    visible_warmup_iters: 3
    lr: 0.025
    white_background: true
