# Same-mask setting 配置模板。
# 单图运行用 --mask 指定 mask；dataset 运行通过 manifest 的 mask_path 指定 mask。
seed: 7
device: auto

image:
  size: 64
  input_path: null

frontend:
  mask_source: file
  mask_path: null
  mask_dir: null
  mask_format: auto
  mask_instance_mode: auto
  mask_resize_mode: nearest
  mask_min_area_ratio: 0.002
  mask_max_num_objects: null
  mask_keep_ids: null
  sam_backend: stub
  dino_backend: stub
  depth_backend: stub

training:
  visible_warmup_iters: 3
  hidden_prior_iters: 3
  joint_ownership_iters: 3
  edit_finetune_iters: 2


# editing suite smoke-test config??????????
editing:
  default_ops:
    - remove
    - translate
    - scale
    - isolate
    - object_only
  translate_vector: [0.12, 0.0, 0.0]
  scale_factor: 1.2
  edit_region_radius: 3
  ownership_threshold: 0.2
  max_objects: 3

training:
  visible_warmup_iters: 3
  hidden_prior_iters: 3
  joint_ownership_iters: 3
  edit_finetune_iters: 2
