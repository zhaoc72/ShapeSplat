name: cache_frontend
description: "Cache frontend outputs for an example dataset."
default_out: outputs/experiments/cache_frontend
steps:
  - name: create_example_dataset
    enabled: true
    command:
      - python
      - scripts/create_example_dataset.py
      - --out
      - examples/example_dataset
      - --num-images
      - "4"
      - --size
      - "128"

  - name: cache_frontend
    enabled: true
    command:
      - python
      - scripts/cache_frontend_outputs.py
      - --config
      - configs/local_real_frontend.yaml
      - --manifest
      - examples/example_dataset/manifest.csv
      - --out-cache
      - "{out}/frontend_cache"
      - --max-images
      - "3"
      - --write-manifest
      - "{out}/frontend_cache/cache_manifest.csv"
      - --update-dataset-manifest
      - "{out}/manifest_with_cache.csv"
      - --validate

  - name: cache_to_same_mask
    enabled: true
    command:
      - python
      - scripts/cache_to_same_mask_dataset.py
      - --image-manifest
      - examples/example_dataset/manifest.csv
      - --cache-manifest
      - "{out}/frontend_cache/cache_manifest.csv"
      - --out
      - "{out}/cached_same_mask_dataset"
      - --copy-images
      - --overwrite
