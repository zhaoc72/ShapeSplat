name: co3dv2_cache
description: "Convert CO3Dv2 single subset and cache frontend outputs."
default_out: outputs/experiments/co3dv2_cache
steps:
  - name: inspect_co3dv2
    enabled: true
    command:
      - python
      - scripts/inspect_co3dv2_single.py
      - --root
      - D:\projects\datasets\co3dv2_single
      - --out
      - "{out}/inspect"

  - name: convert_co3dv2_small
    enabled: true
    command:
      - python
      - scripts/convert_co3dv2_single.py
      - --root
      - D:\projects\datasets\co3dv2_single
      - --out
      - data/co3dv2_single_benchmark
      - --max-categories
      - "3"
      - --max-sequences
      - "2"
      - --max-frames-per-sequence
      - "5"
      - --copy-files
      - --overwrite

  - name: validate_benchmark
    enabled: true
    command:
      - python
      - scripts/validate_benchmark_v2.py
      - --manifest
      - data/co3dv2_single_benchmark/manifest.csv
      - --config
      - configs/final_benchmark.yaml
      - --out
      - "{out}/validate"

  - name: cache_frontend
    enabled: false
    command:
      - python
      - scripts/cache_frontend_outputs.py
      - --config
      - configs/local_real_frontend.yaml
      - --manifest
      - data/co3dv2_single_benchmark/manifest.csv
      - --out-cache
      - "{out}/frontend_cache"
      - --max-images
      - "20"
      - --write-manifest
      - "{out}/frontend_cache/cache_manifest.csv"
      - --validate
